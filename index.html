<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <meta name="theme-color" content="#0b3a2a" id="meta_theme_color" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Hotel CRM</title>

  <link id="app_favicon" rel="icon" href="./favicon.ico" />
  <link id="app_shortcut_icon" rel="shortcut icon" href="./favicon.ico" />
  <link id="app_apple_touch_icon" rel="apple-touch-icon" href="./favicon.ico" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/app.css" />
  <link id="design_css" rel="stylesheet" href="./css/designs/design-executive.css" />
  <link id="theme_css" rel="stylesheet" href="./css/themes/theme-green.css" />

</head>
<body>
 <header id="app_header"></header>

  <main id="app" class="app">
    <div class="card">
      <h2>Loading…</h2>
      <p>Please wait</p>
    </div>
  </main>

  <nav class="bottomNav" aria-label="Primary">
  <button class="navBtn active" data-route="dashboard">
    <span class="navIcon">📊</span><span class="navLabel">Dash</span>
  </button>

  <button class="navBtn" data-route="leads">
    <span class="navIcon">🏨</span><span class="navLabel">Leads</span>
  </button>

  <button class="navBtn" data-route="followups">
    <span class="navIcon">⏰</span><span class="navLabel">Follow-up</span>
  </button>

  <button class="navBtn" data-route="calendar">
    <span class="navIcon">📅</span><span class="navLabel">Calendar</span>
  </button>

  <button class="navBtn" data-route="manage" id="btn_manage_nav">
    <span class="navIcon">🧩</span><span class="navLabel">Manage</span>
  </button>
</nav>
  <button class="fab" id="fab_add" title="Add" aria-label="Add">＋</button>



  <!-- Settings Bottom Sheet -->
  <div id="settings_sheet" class="sheetBackdrop" style="display:none;">
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="sheetHandle"></div>
      <div class="sheetHeader">
        <div class="sheetTitle">Settings</div>
        <button class="iconBtn sheetClose" id="btn_sheet_close" aria-label="Close">✕</button>
      </div>

      <div class="sheetBody" id="settings_sheet_body">
        <!-- Filled by app.js -->
      </div>
    </div>
  </div>



  

  
<script src="./js/disable-zoom.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="./js/app.js"></script>
<script>
  // Push Service Worker (must be in same scope as the app)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./push-sw.js").catch(console.warn);
    });
  }
</script>
  
</body>

</html>
